name: EGRET Frontend CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Lint Check
        run: bun run lint

      - name: Type Check
        run: bunx tsc --noEmit

      - name: Run Tests
        run: bun run test

      - name: Build Check
        run: bun run build
